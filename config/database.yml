# PostgreSQL. Versions 9.5 and up are supported.
#
# Install the PostgreSQL driver
#   gem install pg
#
# Ensure the pg gem is defined in your Gemfile
#   gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= ENV['DATABASE_URL'] %>

development:
  <<: *default
  database: <%= ENV['DB_DEV'] %>

test:
  <<: *default
  database: <%= ENV['DB_TEST'] %>

# DATABASE_URL: <%= ENV['DATABASE_URL'] %>  # Commented out - not a valid Rails environment key

production:
  <<: *default
  database: <%= ENV['DB_PROD'] %>
  # pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>  # Commented out - already inherited from default
  timeout: 5000
