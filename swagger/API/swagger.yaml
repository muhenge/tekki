---
openapi: 3.0.1
info:
  title: Tekki API
  version: 1.0.0
  description: A professional networking API for career development and skill sharing
paths:
  "/api/auth/signup":
    post:
      summary: Create a new user account
      tags:
        - Authentication
        - Public
      security: []
      parameters: []
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
                      username:
                        type: string
                      firstname:
                        type: string
                      lastname:
                        type: string
                      slug:
                        type: string
                      created_at:
                        type: string
                      updated_at:
                        type: string
                  message:
                    type: string
        "422":
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  errors:
                    type: object
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                      example: user@example.com
                    password:
                      type: string
                      example: password123
                    password_confirmation:
                      type: string
                      example: password123
                    username:
                      type: string
                      example: johndoe
                    firstname:
                      type: string
                      example: John
                    lastname:
                      type: string
                      example: Doe
                    bio:
                      type: string
                      example: Software developer
                    about:
                      type: string
                      example: Passionate about technology
                  required:
                    - email
                    - password
                    - password_confirmation
                    - username
                    - firstname
                    - lastname
  "/api/auth/login":
    post:
      summary: User login
      tags:
        - Authentication
        - Public
      security: []
      parameters: []
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
                      username:
                        type: string
                      firstname:
                        type: string
                      lastname:
                        type: string
                      slug:
                        type: string
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                      example: user@example.com
                    password:
                      type: string
                      example: password123
                  required:
                    - email
                    - password
  "/api/auth/logout":
    delete:
      summary: User logout
      tags:
        - Authentication
        - Protected
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  "/api/auth/current_user":
    get:
      summary: Get current user information
      tags:
        - Authentication
        - Protected
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
                      username:
                        type: string
                      firstname:
                        type: string
                      lastname:
                        type: string
                      slug:
                        type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  "/api/auth/magic_login":
    post:
      summary: Magic login with token
      tags:
        - Authentication
        - Public
      security: []
      parameters: []
      responses:
        "200":
          description: Magic login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
                      username:
                        type: string
        "401":
          description: Invalid token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  example: abc123def456
              required:
                - token
  "/api/careers/index":
    get:
      summary: Get all careers
      tags:
        - Careers
        - Public
      security: []
      responses:
        "200":
          description: Careers retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    field:
                      type: string
                      example: Software Development
                    created_at:
                      type: string
                    updated_at:
                      type: string
  "/api/careers":
    get:
      summary: Get all careers (alternative endpoint)
      tags:
        - Careers
        - Public
      security: []
      responses:
        "200":
          description: Careers retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    field:
                      type: string
                    created_at:
                      type: string
                    updated_at:
                      type: string
  "/api/posts/{post_id}/comments":
    post:
      summary: Create a comment on a post
      tags:
        - Comments
        - Protected
      security:
        - bearerAuth: []
      parameters:
        - name: post_id
          in: path
          description: Post slug or ID
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Comment created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  comment:
                    type: object
                    properties:
                      id:
                        type: integer
                      text:
                        type: string
                      created_at:
                        type: string
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                          username:
                            type: string
                  message:
                    type: string
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: object
                  properties:
                    text:
                      type: string
                      example: This is a great post!
                  required:
                    - text
    get:
      summary: Get comments for a post
      tags:
        - Comments
        - Protected
      security:
        - bearerAuth: []
      parameters:
        - name: post_id
          in: path
          description: Post slug or ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Comments retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    text:
                      type: string
                    created_at:
                      type: string
                    user:
                      type: object
                      properties:
                        id:
                          type: integer
                        username:
                          type: string
                        slug:
                          type: string
  "/api/comments/{id}":
    delete:
      summary: Delete a comment
      tags:
        - Comments
        - Protected
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: Comment ID
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comment deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "404":
          description: Comment not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  "/api/posts/search":
    get:
      summary: Search posts by title and filter by careers
      tags:
        - Posts
        - Protected
      security:
        - bearerAuth: []
      parameters:
        - name: query
          in: query
          description: Search by title
          required: false
          schema:
            type: string
        - name: career_ids[]
          in: query
          description: Filter by career IDs
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: integer
      responses:
        "200":
          description: Search results retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        title:
                          type: string
                        content:
                          type: string
                        author:
                          type: string
                        slug:
                          type: string
                        created_at:
                          type: string
                        updated_at:
                          type: string
                        user:
                          type: object
                        careers:
                          type: array
                        comments:
                          type: array
                        votes_count:
                          type: integer
                        liked_by_current_user:
                          type: boolean
                  user_posts:
                    type: array
                    items:
                      type: object
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  "/api/posts":
    get:
      summary: Get all posts (feed)
      tags:
        - Posts
        - Protected
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Posts retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        title:
                          type: string
                        content:
                          type: string
                        author:
                          type: string
                        slug:
                          type: string
                        created_at:
                          type: string
                        updated_at:
                          type: string
                        user:
                          type: object
                          properties:
                            id:
                              type: integer
                            username:
                              type: string
                            firstname:
                              type: string
                            lastname:
                              type: string
                            email:
                              type: string
                            bio:
                              type: string
                            about:
                              type: string
                            slug:
                              type: string
                            avatar_url:
                              type: string
                        careers:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: integer
                              field:
                                type: string
                        comments:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: integer
                              text:
                                type: string
                              created_at:
                                type: string
                              updated_at:
                                type: string
                              user:
                                type: object
                                properties:
                                  id:
                                    type: integer
                                  username:
                                    type: string
                                  slug:
                                    type: string
                        votes_count:
                          type: integer
                        liked_by_current_user:
                          type: boolean
                  user_posts:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        title:
                          type: string
                        content:
                          type: string
                        author:
                          type: string
                        slug:
                          type: string
                        created_at:
                          type: string
                        updated_at:
                          type: string
                        user:
                          type: object
                        careers:
                          type: array
                        comments:
                          type: array
                        votes_count:
                          type: integer
                        liked_by_current_user:
                          type: boolean
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    post:
      summary: Create a new post
      tags:
        - Posts
        - Protected
      security:
        - bearerAuth: []
      parameters: []
      responses:
        "201":
          description: Post created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  post:
                    type: object
                    properties:
                      id:
                        type: integer
                      title:
                        type: string
                      content:
                        type: string
                      created_at:
                        type: string
                      updated_at:
                        type: string
                  message:
                    type: string
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                post:
                  type: object
                  properties:
                    title:
                      type: string
                      example: My Post Title
                    content:
                      type: string
                      example: This is the content of my post
                    author:
                      type: string
                      example: alice_dev
                    image:
                      type: string
                      format: binary
                    career_ids:
                      type: array
                      items:
                        type: integer
                      example:
                        - 1
                        - 2
                  required:
                    - title
                    - content
  "/api/posts/{id}":
    get:
      summary: Get post by ID
      tags:
        - Posts
        - Protected
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: Post slug or ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Post found
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  title:
                    type: string
                  content:
                    type: string
                  created_at:
                    type: string
                  updated_at:
                    type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      username:
                        type: string
                      firstname:
                        type: string
                      lastname:
                        type: string
                      email:
                        type: string
                      bio:
                        type: string
                      about:
                        type: string
                      slug:
                        type: string
                      avatar_url:
                        type: string
                  careers:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        field:
                          type: string
                  comments:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        text:
                          type: string
                        created_at:
                          type: string
                        updated_at:
                          type: string
                        user:
                          type: object
                          properties:
                            id:
                              type: integer
                            username:
                              type: string
                            slug:
                              type: string
                  votes_count:
                    type: integer
                  liked_by_current_user:
                    type: boolean
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    patch:
      summary: Update post
      tags:
        - Posts
        - Protected
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: Post slug or ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Post updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  post:
                    type: object
                    properties:
                      id:
                        type: integer
                      title:
                        type: string
                      content:
                        type: string
                      updated_at:
                        type: string
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                post:
                  type: object
                  properties:
                    title:
                      type: string
                    content:
                      type: string
                    image:
                      type: string
                      format: binary
                    career_ids:
                      type: array
                      items:
                        type: integer
    delete:
      summary: Delete post
      tags:
        - Posts
        - Protected
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: Post slug or ID
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Post deleted successfully
        "404":
          description: Post not found
  "/api/posts/{id}/vote":
    post:
      summary: Like/Unlike a post
      tags:
        - Posts
        - Protected
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: Post slug or ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Post liked/unliked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  "/api/relationships":
    post:
      summary: Follow a user
      tags:
        - Relationships
        - Protected
      security:
        - bearerAuth: []
      parameters: []
      responses:
        "201":
          description: Relationship created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  followed_user:
                    type: object
                    properties:
                      id:
                        type: integer
                      username:
                        type: string
                      slug:
                        type: string
        "404":
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "422":
          description: Cannot follow yourself
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                followed_id:
                  type: integer
                  example: 2
                  description: ID of user to follow
              required:
                - followed_id
  "/api/relationships/{id}":
    delete:
      summary: Unfollow a user
      tags:
        - Relationships
        - Protected
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: Relationship ID
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Relationship destroyed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  unfollowed_user:
                    type: object
                    properties:
                      id:
                        type: integer
                      username:
                        type: string
                      slug:
                        type: string
        "404":
          description: Relationship not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  "/api/skills":
    post:
      summary: Create user skills
      tags:
        - Skills
        - Protected
      security:
        - bearerAuth: []
      parameters: []
      responses:
        "200":
          description: Skills created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  skills:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        level:
                          type: string
                        created_at:
                          type: string
                  message:
                    type: string
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: array
                      items:
                        type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                skills:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        example: Ruby on Rails
                      level:
                        type: string
                        enum:
                          - Beginner
                          - Intermediate
                          - Advanced
                        example: Intermediate
                    required:
                      - name
                      - level
              required:
                - skills
  "/api/skills/{id}":
    patch:
      summary: Update a skill
      tags:
        - Skills
        - Protected
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: Skill ID
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Skill updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  skill:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      level:
                        type: string
                      updated_at:
                        type: string
                  message:
                    type: string
        "404":
          description: Skill not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                skill:
                  type: object
                  properties:
                    name:
                      type: string
                    level:
                      type: string
                      enum:
                        - Beginner
                        - Intermediate
                        - Advanced
    delete:
      summary: Delete a skill
      tags:
        - Skills
        - Protected
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: Skill ID
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Skill deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "404":
          description: Skill not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  "/api/users":
    get:
      summary: Get all users
      tags:
        - Users
        - Public
      security: []
      parameters:
        - name: page
          in: query
          required: false
          description: Page number
          schema:
            type: integer
        - name: per_page
          in: query
          required: false
          description: Items per page
          schema:
            type: integer
      responses:
        "200":
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        email:
                          type: string
                        username:
                          type: string
                        firstname:
                          type: string
                        lastname:
                          type: string
                        slug:
                          type: string
                        bio:
                          type: string
                        about:
                          type: string
                        created_at:
                          type: string
                        updated_at:
                          type: string
                  meta:
                    type: object
                    properties:
                      current_page:
                        type: integer
                      next_page:
                        type: integer
                      prev_page:
                        type: integer
                      total_pages:
                        type: integer
                      total_count:
                        type: integer
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  "/api/users/{slug}":
    get:
      summary: Get user by slug
      tags:
        - Users
        - Protected
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          description: User slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  user:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                          email:
                            type: string
                          username:
